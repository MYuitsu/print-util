name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # trigger on: git tag v0.1.0 && git push --tags

permissions:
  contents: write   # create GitHub Release and upload assets

jobs:
  build:
    name: Build installer (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      # Copy binary to expected location for Inno Setup
      - name: Stage binary
        run: |
          New-Item -ItemType Directory -Force target\release | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\print-util.exe target\release\print-util.exe

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc installer\setup.iss

      - name: Generate checksum
        run: |
          $file = Get-ChildItem installer\Output\*.exe | Select-Object -First 1
          $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($file.Name)" | Out-File -Encoding ascii installer\Output\SHA256SUMS.txt
          Write-Host "SHA256: $hash  $($file.Name)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "print-util ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            installer/Output/print-util-*.exe
            installer/Output/SHA256SUMS.txt