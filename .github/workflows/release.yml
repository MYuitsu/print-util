name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # trigger on: git tag v0.1.0 && git push --tags

permissions:
  contents: write   # create GitHub Release and upload assets

jobs:
  build:
    name: Build installer (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      # Copy binary to expected location for Inno Setup
      - name: Stage binary
        run: |
          New-Item -ItemType Directory -Force target\release | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\print-util.exe target\release\print-util.exe

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Resolve latest GS asset name/URL (used as cache key)
      - name: Resolve Ghostscript asset
        id: gs
        run: |
          $rel   = Invoke-RestMethod "https://api.github.com/repos/ArtifexSoftware/ghostpdl-downloads/releases/latest"
          $asset = $rel.assets | Where-Object { $_.name -match "w64\.exe$" } | Select-Object -First 1
          Write-Host "Found: $($asset.name)"
          echo "url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          echo "filename=$($asset.name)"            >> $env:GITHUB_OUTPUT

      # Cache the DLL so repeated builds skip the ~100 MB download
      - name: Cache Ghostscript DLL
        id: cache-gs
        uses: actions/cache@v4
        with:
          path: |
            installer/vendor/gsdll64.dll
            installer/vendor/gswin64c.exe
            installer/vendor/gs_lib
          key: gsdll64-${{ steps.gs.outputs.filename }}

      # Download and bundle gsdll64.dll (Ghostscript AGPL, bundling allowed for OSS)
      # Uses 7-zip (pre-installed on GitHub runners) to extract the DLL directly
      # from the InnoSetup archive — never runs the installer, no CI hang.
      - name: Bundle Ghostscript DLL
        if: steps.cache-gs.outputs.cache-hit != 'true'
        run: |
          Write-Host "Downloading ${{ steps.gs.outputs.url }}"
          Invoke-WebRequest "${{ steps.gs.outputs.url }}" -OutFile gs-setup.exe
          & "C:\Program Files\7-Zip\7z.exe" e gs-setup.exe -ogs-extract -y
          New-Item -ItemType Directory -Force installer\vendor | Out-Null
          $dll = Get-ChildItem gs-extract -Recurse -Filter "gsdll64.dll" | Select-Object -First 1
          if (-not $dll) { throw "gsdll64.dll not found in extracted archive" }
          Copy-Item $dll.FullName installer\vendor\gsdll64.dll
          Write-Host "Staged $($dll.FullName)"
          # Also bundle the CLI executable (used as primary print engine)
          $cli = Get-ChildItem gs-extract -Recurse -Filter "gswin64c.exe" | Select-Object -First 1
          if ($cli) {
            Copy-Item $cli.FullName installer\vendor\gswin64c.exe
            Write-Host "Staged CLI: $($cli.FullName)"
          } else {
            Write-Warning "gswin64c.exe not found in archive - DLL-only bundle"
          }
          # Bundle gs lib/ (gs_init.ps, fonts, etc. needed by gswin64c.exe)
          $libDir = Get-ChildItem gs-extract -Recurse -Filter "gs_init.ps" | Select-Object -First 1 | ForEach-Object { $_.Directory }
          if ($libDir) {
            New-Item -ItemType Directory -Force installer\vendor\gs_lib | Out-Null
            Copy-Item "$($libDir.FullName)\*" installer\vendor\gs_lib\ -Recurse
            Write-Host "Staged gs_lib from $($libDir.FullName)"
          } else {
            Write-Warning "gs_init.ps not found - gs_lib not staged"
          }

      # SumatraPDF portable (primary print engine – single self-contained exe, MIT)
      - name: Cache SumatraPDF
        id: cache-sumatra
        uses: actions/cache@v4
        with:
          path: installer/vendor/SumatraPDF.exe
          key: SumatraPDF-3.6

      - name: Bundle SumatraPDF
        if: steps.cache-sumatra.outputs.cache-hit != 'true'
        run: |
          $url = "https://www.sumatrapdfreader.org/dl/rel/3.6/SumatraPDF-3.6-64.exe"
          New-Item -ItemType Directory -Force installer\vendor | Out-Null
          Invoke-WebRequest $url -OutFile installer\vendor\SumatraPDF.exe -Headers @{"User-Agent"="print-util-ci"}
          Write-Host "Staged SumatraPDF: $((Get-Item installer\vendor\SumatraPDF.exe).Length) bytes"

      - name: Build installer
        run: iscc installer\setup.iss

      - name: Generate checksum
        run: |
          $file = Get-ChildItem installer\Output\*.exe | Select-Object -First 1
          $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($file.Name)" | Out-File -Encoding ascii installer\Output\SHA256SUMS.txt
          Write-Host "SHA256: $hash  $($file.Name)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "print-util ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            installer/Output/print-util-*.exe
            installer/Output/SHA256SUMS.txt