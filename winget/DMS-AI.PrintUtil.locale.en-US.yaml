ShortDescription: Silent local PDF print server – no dialog, no popup.
Description: |-
  print-util is a lightweight local HTTP server that accepts a PDF file via
  a multipart POST request and sends it silently to the Windows print spooler.
  No printer-selection dialog, no page-size dialog, no browser window.

  Designed for use with browser extensions or web applications that need
  to trigger printing programmatically without user interaction.
