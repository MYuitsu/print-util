<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 13px; width: 360px; padding: 12px; color: #111; }
    h1 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #555; text-transform: uppercase; letter-spacing: .5px; }
    .row { margin-bottom: 8px; }
    label { display: block; font-size: 11px; color: #777; margin-bottom: 2px; }
    input, select {
      width: 100%; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 12px;
      background: #fff;
    }
    input:focus, select:focus { outline: 2px solid #0066cc; border-color: transparent; }
    .printer-row { display: flex; gap: 4px; align-items: stretch; }
    .printer-row select { flex: 1; min-width: 0; }
    .btn-reload {
      flex: 0 0 auto; padding: 5px 8px;
      border: 1px solid #ccc; border-radius: 4px;
      background: #f5f5f5; font-size: 14px; cursor: pointer; line-height: 1;
    }
    .btn-reload:hover { background: #e0e0e0; }
    .btn-row { display: flex; gap: 6px; margin-top: 4px; }
    button {
      flex: 1; padding: 6px 0; border: none; border-radius: 4px;
      font-size: 12px; cursor: pointer; font-weight: 500;
    }
    .btn-primary  { background: #0066cc; color: #fff; }
    .btn-primary:hover  { background: #0052a3; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-secondary:hover { background: #ddd; }
    button:disabled { opacity: .5; cursor: default; }
    .sep { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    #log {
      margin-top: 10px;
      background: #1e1e1e; color: #d4d4d4;
      padding: 8px; border-radius: 4px;
      font-family: 'Consolas', monospace; font-size: 11px;
      max-height: 180px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .ok  { color: #4ec9b0; }
    .err { color: #f48771; }
    .inf { color: #9cdcfe; }
  </style>
</head>
<body>
  <h1>🛠 print-util debug</h1>

  <div class="row">
    <label>Server URL</label>
    <input id="server" type="url" value="http://127.0.0.1:17474" />
  </div>

  <div class="btn-row">
    <button class="btn-secondary" id="btn-health">Ping /health</button>
  </div>

  <hr class="sep" />

  <div class="row">
    <label>Tên tài liệu (tên job in, để trống = tự tạo)</label>
    <input id="job-name" type="text" placeholder="Hóa đơn #001 – Nguyễn Văn A" />
  </div>
  <div class="row">
    <label>URL file PDF để in thử</label>
    <input id="pdf-url" type="url" placeholder="https://example.com/sample.pdf" />
  </div>
  <div class="row">
    <label>Máy in</label>
    <div class="printer-row">
      <select id="printer-select">
        <option value="">(mặc định)</option>
      </select>
      <button class="btn-reload" id="btn-reload-printers" title="Tải lại danh sách máy in">↻</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-primary" id="btn-print-a4">📄 In A4</button>
    <button class="btn-primary" id="btn-print-a5">📃 In A5</button>
    <button class="btn-secondary" id="btn-clear">Xoá log</button>
  </div>

  <div id="log">Nhấn "Ping /health" để kiểm tra server...\n</div>

  <script src="popup.js"></script>
</body>
</html>
